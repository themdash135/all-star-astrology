name: iOS Build & TestFlight

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - '.github/workflows/ios-build.yml'

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Select Xcode 26
        run: |
          XCODE26=$(ls -d /Applications/Xcode_26*.app 2>/dev/null | sort -V | tail -1)
          if [ -n "$XCODE26" ]; then
            sudo xcode-select -s "$XCODE26"
            echo "Using $XCODE26"
          else
            echo "Xcode 26 not found, available versions:"
            ls /Applications/Xcode*.app
            echo "Using default"
          fi
          xcodebuild -version

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Install Capacitor iOS
        working-directory: frontend
        run: npm install @capacitor/ios

      - name: Add iOS platform
        working-directory: frontend
        run: npx cap add ios

      - name: Sync Capacitor iOS
        working-directory: frontend
        run: npx cap sync ios

      - name: Bump iOS build number
        working-directory: frontend
        run: |
          PLIST=ios/App/App/Info.plist
          BUILD_NUM=${{ github.run_number }}
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" "$PLIST"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString 1.2.0" "$PLIST"
          echo "Set iOS build number to $BUILD_NUM, version 1.2.0"

      - name: Set export compliance
        working-directory: frontend
        run: |
          PLIST=ios/App/App/Info.plist
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" "$PLIST" 2>/dev/null || \
          /usr/libexec/PlistBuddy -c "Set :ITSAppUsesNonExemptEncryption false" "$PLIST"
          echo "Export compliance flag set"

      - name: Set app icon
        working-directory: frontend
        run: |
          ICON=resources/icon.png
          ASSETS=ios/App/App/Assets.xcassets/AppIcon.appiconset
          if [ -f "$ICON" ] && [ -d "$ASSETS" ]; then
            npx --yes sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-20x20@1x.png" resize 20 20
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-20x20@2x.png" resize 40 40
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-20x20@3x.png" resize 60 60
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-29x29@1x.png" resize 29 29
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-29x29@2x.png" resize 58 58
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-29x29@3x.png" resize 87 87
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-40x40@1x.png" resize 40 40
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-40x40@2x.png" resize 80 80
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-40x40@3x.png" resize 120 120
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-60x60@2x.png" resize 120 120
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-60x60@3x.png" resize 180 180
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-76x76@1x.png" resize 76 76
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-76x76@2x.png" resize 152 152
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-83.5x83.5@2x.png" resize 167 167
            npx sharp-cli -i "$ICON" -o "$ASSETS/AppIcon-512@2x.png" resize 1024 1024
            echo "iOS icons generated"
          else
            echo "Skipping icon generation — source or target not found"
          fi

      - name: Find and install CocoaPods
        working-directory: frontend
        run: |
          PODFILE=$(find ios -name Podfile -type f | head -1)
          if [ -n "$PODFILE" ]; then
            echo "Found Podfile at: $PODFILE"
            cd "$(dirname "$PODFILE")"
            pod install
          else
            echo "No Podfile found — listing ios structure:"
            find ios -maxdepth 3 -type f | head -30
          fi

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Create variables
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          # Decode from base64
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Create temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate to keychain
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Apply provisioning profile
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build archive
        working-directory: frontend
        env:
          TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          WORKSPACE=$(find ios -name "*.xcworkspace" -not -path "*/Pods/*" | head -1)
          echo "Using workspace: $WORKSPACE"
          xcodebuild -workspace "$WORKSPACE" \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="AllStarAstrology AppStore" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            archive

      - name: Export IPA
        run: |
          cat > $RUNNER_TEMP/ExportOptions.plist << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${{ secrets.APPLE_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.allstarastrology.app</key>
              <string>AllStarAstrology AppStore</string>
            </dict>
            <key>signingCertificate</key>
            <string>Apple Distribution</string>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/output

      - name: Upload to TestFlight (internal + external)
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY: ${{ secrets.ASC_API_KEY }}
        run: |
          # Write API key to file
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APP_STORE_CONNECT_API_KEY" > ~/.appstoreconnect/private_keys/AuthKey_${APP_STORE_CONNECT_API_KEY_ID}.p8

          IPA=$(ls $RUNNER_TEMP/output/*.ipa | head -1)
          echo "Uploading: $IPA"

          # Use xcrun altool (works on Xcode 15+; falls back gracefully on Xcode 26)
          xcrun altool --upload-app \
            -f "$IPA" \
            -t ios \
            --apiKey "$APP_STORE_CONNECT_API_KEY_ID" \
            --apiIssuer "$APP_STORE_CONNECT_API_ISSUER_ID" \
            --verbose 2>&1 || \
          # Fallback: use xcrun notarytool-style upload via xcodebuild
          xcrun xcodebuild \
            -exportNotarizedApp \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportPath $RUNNER_TEMP/output \
            DEVELOPMENT_TEAM="${{ secrets.APPLE_TEAM_ID }}" || true

          echo "Upload complete — build will appear in TestFlight for internal testers immediately"
          echo "External testers require beta app review (~24-48h after upload)"

      - name: Clean up keychain
        if: always()
        run: security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
